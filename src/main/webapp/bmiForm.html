<!DOCTYPE html>
<html>
    <head>
        <meta charset='utf-8'>
        <meta http-equiv='X-UA-Compatible' content='IE=edge'>
        <title>BMI 입력 HTML</title>
        <meta name='viewport' content='width=device-width, initial-scale=1'>
    </head>
    <body>
        <h2>BMI 입력</h2>
        <!-- servlet url맵핑값을 action에 넣어줍니다. -->
        <form action="bmi.do" method="post">
            <label for="height">키 : </label>
            <input type="text" id="height" name="height" placeholder="키 입력. 단위는 cm">
            <br>    
            <label for="weight">몸무게 : </label>
            <input type="text" id="weight" name="weight" placeholder="몸무게 입력. 단위는 kg">
            <br>
            <input type="submit" value="체크">
        </form>        
    </body>
</html>
